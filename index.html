<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري التحويل...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .loader { width: 40px; height: 40px; border: 4px solid #1e293b; border-top: 4px solid #38bdf8; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform: rotate(360deg); } }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <div id="msg" style="font-size: 18px; color: #38bdf8;">جاري جلب الرابط...</div>
    </div>

    <script>
        // الروابط المباشرة (استخدام raw=1 أسرع من dl=1)
        const dropboxFiles = {
            "1": "https://dl.dropbox.com/scl/fi/7bxmcqhq9nk84amz8e7rq/cod1.txt?rlkey=auh6cuhsnrooeb2mnutem5frw&dl=1",
            "2": "https://dl.dropbox.com/scl/fi/g1urcyb28g3q0e9flepov/cod2.txt?rlkey=urseria5082w7cegpvcsthmt8&dl=1",
            "3": "https://dl.dropbox.com/scl/fi/ftbmc34yi26ah4c4pzdb5/cod3.txt?rlkey=ac0fwc822j02l3ssq7syhdvom&dl=1",
            "4": "https://dl.dropbox.com/scl/fi/go1glymwmqotjxiyzzu5r/cod4.txt?rlkey=5t8wtjsr266pqp1wg7m14usmd&dl=1",
            "5": "https://dl.dropbox.com/scl/fi/1ynfs1kre709rq9pwdh6o/cod5.txt?rlkey=218xw5e4568o589udxofjjvwj&dl=1"
        };

        const id = new URLSearchParams(window.location.search).get('id');

        async function go() {
            if (id && dropboxFiles[id]) {
                try {
                    // استخدام محرك أسرع لجلب البيانات
                    const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(dropboxFiles[id])}`);
                    const url = await r.text();
                    const final = url.trim();

                    if (final.startsWith('http')) {
                        window.location.replace(final);
                    } else {
                        document.getElementById('msg').innerText = "الرابط داخل الملف غير صحيح";
                    }
                } catch (e) {
                    document.getElementById('msg').innerText = "خطأ في الاتصال";
                }
            } else {
                document.getElementById('msg').innerText = "المعرف غير موجود";
            }
        }
        go();
    </script>
</body>
</html>
